<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미니 카지노 - UI 복구</title>
  <style>
    /* 전체 배경 및 폰트 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'apple-system', sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding-top: 20px; color: #333; }
    
    /* 메인 컨테이너 */
    .game-wrap { width: 100%; max-width: 500px; background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

    /* 헤더 */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header-title { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; }

    /* 상단 스탯 카드 (4개) */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 30px; }
    .stat-card { background: #f1f3f5; border-radius: 10px; padding: 15px 5px; text-align: center; }
    .stat-label { font-size: 12px; color: #868e96; margin-bottom: 8px; }
    .stat-value { font-size: 18px; font-weight: 800; }

    /* 중앙 동전 이미지 구역 */
    .coin-visual-area { width: 140px; height: 140px; background: #e9ecef; border-radius: 50%; margin: 20px auto 40px; display: flex; align-items: center; justify-content: center; border: 8px solid #dee2e6; font-size: 50px; }

    /* 배율/확률 안내 바 */
    .info-bar { background: #f1f3f5; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; color: #495057; margin-bottom: 8px; }
    .fee-text { font-size: 11px; color: #adb5bd; text-align: center; margin-bottom: 20px; }

    /* 컨트롤 그룹 (선택, 배율, 베팅액) */
    .row-label { font-size: 14px; color: #495057; width: 60px; flex-shrink: 0; }
    .control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .btn-group { display: flex; gap: 8px; flex: 1; }

    /* 공통 버튼 스타일 */
    button { cursor: pointer; border: 1px solid #dee2e6; background: white; border-radius: 8px; transition: all 0.2s; }
    .btn-choice { flex: 1; padding: 12px; font-size: 15px; }
    .btn-multi { flex: 1; padding: 8px; font-size: 13px; line-height: 1.4; }
    .btn-preset { padding: 8px 12px; font-size: 13px; }
    
    /* 버튼 활성화 상태 */
    button.active { border: 2px solid #378ADD; color: #378ADD; font-weight: bold; }
    
    /* 입력창 */
    .bet-input { flex: 1; padding: 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 16px; width: 80px; }

    /* 던지기 버튼 (사진 속 파란색) */
    .btn-play { width: 100%; padding: 18px; border: none; border-radius: 10px; background: #BBD6F1; color: #4A76A8; font-size: 18px; font-weight: bold; margin-top: 20px; }
    .btn-play.ready { background: #378ADD; color: white; }

    /* 기록 섹션 */
    .history-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
    .history-header { display: flex; justify-content: space-between; font-size: 14px; color: #888; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div class="game-wrap">
    <!-- 헤더 -->
    <div class="header">
      <div class="header-title">🪙 동전 던지기</div>
      <div style="cursor:pointer; font-size:24px;">≡</div>
    </div>

    <!-- 스탯 -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">잔액</div><div class="stat-value" id="balance">1,000</div></div>
      <div class="stat-card"><div class="stat-label">총 손익</div><div class="stat-value" id="profit">+0</div></div>
      <div class="stat-card"><div class="stat-label">승리</div><div class="stat-value" id="wins">0</div></div>
      <div class="stat-card"><div class="stat-label">패배</div><div class="stat-value" id="losses">0</div></div>
    </div>

    <!-- 동전 비주얼 -->
    <div class="coin-visual-area" id="coin-box">🏛️</div>

    <!-- 안내 바 -->
    <div class="info-bar">
      배율 <span id="display-multi">-</span> | 확률 <span id="display-prob">-</span> | 예상 수익 <span id="display-prize">-</span>
    </div>
    <div class="fee-text">수수료 7% 적용 · 이겼을 때 상금의 93%만 획득</div>

    <!-- 선택 영역 -->
    <div class="control-row">
      <div class="row-label">선택</div>
      <div class="btn-group">
        <button class="btn-choice" onclick="selectSide('front', this)">앞면 👑</button>
        <button class="btn-choice" onclick="selectSide('back', this)">뒷면 🌙</button>
      </div>
    </div>

    <!-- 배율 영역 -->
    <div class="control-row">
      <div class="row-label">배율</div>
      <div class="btn-group">
        <button class="btn-multi" onclick="selectMulti(1, 46, this)">1배<br><small>46%</small></button>
        <button class="btn-multi" onclick="selectMulti(2, 31, this)">2배<br><small>31%</small></button>
        <button class="btn-multi" onclick="selectMulti(3, 23, this)">3배<br><small>23%</small></button>
        <button class="btn-multi" onclick="selectMulti(5, 15, this)">5배<br><small>15%</small></button>
        <button class="btn-multi" onclick="selectMulti(10, 8, this)">10배<br><small>8%</small></button>
      </div>
    </div>

    <!-- 베팅액 영역 -->
    <div class="control-row">
      <div class="row-label">베팅액</div>
      <div class="btn-group">
        <input type="number" class="bet-input" id="bet-input" value="100" oninput="calcPrize()">
        <button class="btn-preset" onclick="setAmount(0.25)">1/4</button>
        <button class="btn-preset" onclick="setAmount(0.5)">절반</button>
        <button class="btn-preset" onclick="setAmount(1)">전액</button>
      </div>
    </div>

    <!-- 실행 버튼 -->
    <button class="btn-play" id="play-btn" onclick="tossCoin()">선택 후 던지기</button>

    <!-- 게임 기록 -->
    <div class="history-section">
      <div class="history-header">
        <span>게임 기록</span>
        <span style="background:#eee; padding:2px 8px; border-radius:4px; font-size:12px; cursor:pointer;">기록 지우기</span>
      </div>
      <p style="text-align:center; color:#adb5bd; font-size:14px; margin-top:20px;">아직 게임 기록이 없어요.</p>
    </div>
  </div>

  <script>
    let balance = 1000;
    let selectedSide = null;
    let selectedMulti = 1;
    let selectedProb = 0.46;

    // 선택 로직
    function selectSide(side, btn) {
      selectedSide = side;
      document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      checkReady();
    }

    function selectMulti(multi, prob, btn) {
      selectedMulti = multi;
      selectedProb = prob / 100;
      document.querySelectorAll('.btn-multi').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('display-multi').textContent = multi + '배';
      document.getElementById('display-prob').textContent = prob + '%';
      calcPrize();
      checkReady();
    }

    function setAmount(ratio) {
      const val = Math.floor(balance * ratio);
      document.getElementById('bet-input').value = val;
      calcPrize();
    }

    function calcPrize() {
      const bet = parseInt(document.getElementById('bet-input').value) || 0;
      const prize = Math.floor(bet * selectedMulti * 0.93);
      document.getElementById('display-prize').textContent = prize.toLocaleString();
    }

    function checkReady() {
      const btn = document.getElementById('play-btn');
      if (selectedSide && selectedMulti) {
        btn.classList.add('ready');
        btn.textContent = "던지기!";
      }
    }

    function tossCoin() {
      const bet = parseInt(document.getElementById('bet-input').value);
      if (!selectedSide) return alert("앞면 혹은 뒷면을 선택해주세요!");
      if (bet > balance || bet <= 0) return alert("잔액이 부족하거나 올바르지 않은 금액입니다.");

      balance -= bet;
      const win = Math.random() < selectedProb;
      const coinBox = document.getElementById('coin-box');
      
      // 결과 애니메이션 (간단)
      coinBox.style.transform = "scale(1.2)";
      setTimeout(() => {
        coinBox.style.transform = "scale(1)";
        if (win) {
          const winAmount = Math.floor(bet * selectedMulti * 0.93);
          balance += (bet + winAmount);
          coinBox.textContent = selectedSide === 'front' ? "👑" : "🌙";
          alert("승리했습니다! 상금: " + winAmount);
        } else {
          coinBox.textContent = selectedSide === 'front' ? "🌙" : "👑";
          alert("아쉽게도 패배했습니다.");
        }
        updateUI();
      }, 200);
    }

    function updateUI() {
      document.getElementById('balance').textContent = balance.toLocaleString();
      // 추가 스탯(총 손익 등) 업데이트 로직 추가 가능
    }
  </script>
</body>
</html>
