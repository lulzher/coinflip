<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; padding: 1.5rem 1rem 4rem; display: flex; justify-content: center; }
    .wrap { width: 100%; max-width: 600px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; }
    h1 { font-size: 18px; font-weight: 500; }
    .logout-btn { font-size: 12px; color: #888; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
    .section { background: #fff; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .section-title { font-size: 14px; font-weight: 500; color: #111; margin-bottom: 1rem; }
    .user-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .user-card:last-child { border-bottom: none; }
    .user-info { display: flex; flex-direction: column; gap: 2px; }
    .user-name { font-size: 14px; font-weight: 500; color: #111; }
    .user-email { font-size: 12px; color: #888; }
    .user-stats { font-size: 12px; color: #888; margin-top: 2px; }
    .user-balance { font-size: 15px; font-weight: 500; color: #111; }
    .charge-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .charge-input { padding: 7px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; width: 110px; }
    .charge-btn { padding: 7px 14px; border-radius: 8px; border: none; background: #378ADD; color: #fff; font-size: 13px; cursor: pointer; font-weight: 500; }
    .charge-btn:hover { opacity: 0.88; }
    .deduct-btn { padding: 7px 14px; border-radius: 8px; border: none; background: #D85A30; color: #fff; font-size: 13px; cursor: pointer; font-weight: 500; }
    .deduct-btn:hover { opacity: 0.88; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .login-card { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin: 4rem auto; }
    .login-card h2 { font-size: 18px; font-weight: 500; text-align: center; margin-bottom: 1.5rem; }
    .login-card input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; margin-bottom: 10px; font-family: sans-serif; }
    .login-card button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #378ADD; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
    .error-msg { font-size: 12px; color: #D85A30; text-align: center; margin-top: 8px; min-height: 18px; }
    .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #FAECE7; color: #993C1D; font-weight: 500; margin-left: 6px; }
    .log-table { width: 100%; font-size: 12px; border-collapse: collapse; }
    .log-table th { text-align: left; color: #888; font-weight: 400; padding: 4px 6px; border-bottom: 1px solid #eee; }
    .log-table td { padding: 6px 6px; border-bottom: 1px solid #f5f5f5; color: #333; }
    .win-row td:first-child { border-left: 3px solid #1D9E75; padding-left: 8px; }
    .lose-row td:first-child { border-left: 3px solid #D85A30; padding-left: 8px; }
  </style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <h2>🔐 관리자 로그인</h2>
    <input type="password" id="admin-pw" placeholder="관리자 비밀번호" />
    <button onclick="adminLogin()">로그인</button>
    <div class="error-msg" id="admin-error"></div>
  </div>
</div>
 
<div class="wrap" id="admin-screen" style="display:none;">
  <div class="header">
    <h1>🛠 관리자 페이지</h1>
    <button class="logout-btn" onclick="adminLogout()">로그아웃</button>
  </div>
 
  <div class="section">
    <div class="section-title">유저 목록</div>
    <div id="user-list"><div style="color:#888;font-size:13px;">불러오는 중...</div></div>
  </div>
 
  <div class="section">
    <div class="section-title">최근 게임 기록 (전체)</div>
    <div id="log-section"><div style="color:#888;font-size:13px;">불러오는 중...</div></div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query, limit, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
  const firebaseConfig = {
    apiKey: "AIzaSyBWEkYQqW0HF5jgklL3tELwLKyUxkmKh4Y",
    authDomain: "bett-10c4f.firebaseapp.com",
    projectId: "bett-10c4f",
    storageBucket: "bett-10c4f.firebasestorage.app",
    messagingSenderId: "643489339476",
    appId: "1:643489339476:web:570e948837c21fedf0b5c1",
    measurementId: "G-R6R24L14Z8"
  };
 
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
 
  // ── 관리자 비밀번호 (여기서 변경하세요) ──
  const ADMIN_PASSWORD = "admin1234";
 
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
 
  window.adminLogin = () => {
    const pw = document.getElementById('admin-pw').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadUsers(); loadLogs();
    } else {
      document.getElementById('admin-error').textContent = '비밀번호가 틀렸어요.';
    }
  };
 
  window.adminLogout = () => {
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('admin-pw').value = '';
  };
 
  async function loadUsers() {
    const snap = await getDocs(collection(db, 'users'));
    const users = [];
    snap.forEach(d => users.push({id: d.id, ...d.data()}));
    users.sort((a,b) => (b.balance||0) - (a.balance||0));
 
    const list = document.getElementById('user-list');
    if (!users.length) { list.innerHTML = '<div style="color:#888;font-size:13px;">유저가 없어요.</div>'; return; }
 
    list.innerHTML = users.map(u => `
      <div class="user-card" id="card-${u.id}">
        <div style="flex:1;">
          <div class="user-info">
            <div class="user-name">${u.name || u.displayName || '이름없음'}${u.balance <= 0 ? '<span class="badge">잔액부족</span>' : ''}</div>
            <div class="user-email">${u.email || ''}</div>
            <div class="user-stats">승 ${u.wins||0} / 패 ${u.losses||0} / 손익 ${u.totalProfit>=0?'+':''}${(u.totalProfit||0).toLocaleString()}원</div>
          </div>
          <div class="charge-row">
            <input class="charge-input" type="number" id="amt-${u.id}" placeholder="포인트 입력" min="1" />
            <button class="charge-btn" onclick="chargeUser('${u.id}', '${u.name||u.displayName||''}', 1)">지급</button>
            <button class="deduct-btn" onclick="chargeUser('${u.id}', '${u.name||u.displayName||''}', -1)">차감</button>
          </div>
        </div>
        <div style="text-align:right;padding-left:12px;">
          <div class="user-balance" id="bal-${u.id}">${(u.balance||0).toLocaleString()}원</div>
        </div>
      </div>
    `).join('');
 
    window._users = {};
    users.forEach(u => window._users[u.id] = u);
  }
 
  window.chargeUser = async (uid, name, sign) => {
    const input = document.getElementById('amt-'+uid);
    const amt = parseInt(input.value);
    if (isNaN(amt) || amt < 1) { showToast('포인트를 올바르게 입력해주세요.'); return; }
 
    const u = window._users[uid];
    const newBalance = Math.max(0, (u.balance||0) + sign * amt);
    await updateDoc(doc(db,'users',uid), { balance: newBalance });
 
    // 관리자 지급 기록 남기기
    await addDoc(collection(db,'gameLogs'), {
      uid, userName: name,
      won: sign > 0,
      bet: 0,
      prize: amt,
      label: sign > 0 ? `💰 관리자 지급 +${amt.toLocaleString()}원` : `💸 관리자 차감 -${amt.toLocaleString()}원`,
      balance: newBalance,
      createdAt: serverTimestamp()
    });
 
    window._users[uid].balance = newBalance;
    document.getElementById('bal-'+uid).textContent = newBalance.toLocaleString() + '원';
    input.value = '';
    showToast(`${name}님 ${sign>0?'지급':'차감'} 완료: ${amt.toLocaleString()}원`);
  };
 
  async function loadLogs() {
    const q = query(collection(db,'gameLogs'), orderBy('createdAt','desc'), limit(100));
    const snap = await getDocs(q);
    const logs = [];
    snap.forEach(d => logs.push(d.data()));
 
    const sec = document.getElementById('log-section');
    if (!logs.length) { sec.innerHTML = '<div style="color:#888;font-size:13px;">기록이 없어요.</div>'; return; }
 
    sec.innerHTML = `<table class="log-table">
      <thead><tr><th>유저</th><th>게임</th><th>결과</th><th>잔액</th></tr></thead>
      <tbody>
        ${logs.map(l => `
          <tr class="${l.won?'win-row':'lose-row'}">
            <td>${l.userName||''}</td>
            <td>${l.label||''}</td>
            <td style="color:${l.won?'#0F6E56':'#993C1D'};font-weight:500;">${l.won?'+':'-'}${(l.prize||0).toLocaleString()}원</td>
            <td>${(l.balance||0).toLocaleString()}원</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  }
</script>
</body>
</html>
